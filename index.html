<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unscroll</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#121212',
                            800: '#1e1e1e',
                            700: '#2d2d2d',
                            600: '#404040'
                        },
                        accent: '#38bdf8'
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        body { margin: 0; overflow: hidden; background-color: #121212; color: #e5e5e5; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        
        input[type=range] {
            -webkit-appearance: none;
            background: #2d2d2d;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconSticky = ({ solid }) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill={solid ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h12l6 6v12H3V3z"></path><path d="M15 3v6h6"></path></svg>;
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        const generateId = () => Math.random().toString(36).substring(2, 11);

        // --- Viewport Control Helpers ---
        const lockViewport = () => {
            const meta = document.getElementById('viewport-meta');
            if (meta && !meta.content.includes('maximum-scale=1.0')) {
                meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
            }
        };

        const unlockViewport = () => {
            const meta = document.getElementById('viewport-meta');
            if (meta) {
                // 解除前に現在フォーカスが当たっているか確認し、入力中であれば解除しない
                setTimeout(() => {
                    const active = document.activeElement;
                    if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) {
                        return;
                    }
                    meta.content = 'width=device-width, initial-scale=1.0';
                }, 100);
            }
        };

        const Block = ({ block, index, onChange, onSplit, onMerge, onToggleSticky, focusRequest, onFocusHandled, fontSize }) => {
            const textareaRef = useRef(null);
            const [isComposing, setIsComposing] = useState(false);

            const adjustHeight = () => {
                const el = textareaRef.current;
                if (el) {
                    el.style.height = 'auto';
                    el.style.height = el.scrollHeight + 'px';
                }
            };

            useEffect(() => {
                adjustHeight();
            }, [block.text, fontSize]);

            // プログラム側からのフォーカス要求処理（エンターキーやジャンプ時）
            useEffect(() => {
                if (focusRequest && focusRequest.id === block.id && textareaRef.current) {
                    // フォーカス処理の直前にViewportを強制ロックする
                    lockViewport();
                    
                    // DOMにメタタグの変更が確実に反映されるのを待つため、1フレーム遅延させてフォーカスを実行
                    requestAnimationFrame(() => {
                        if (textareaRef.current) {
                            textareaRef.current.focus();
                            textareaRef.current.setSelectionRange(focusRequest.offset, focusRequest.offset);
                            onFocusHandled();
                        }
                    });
                }
            }, [focusRequest, block.id, onFocusHandled]);

            const handleChange = (e) => {
                onChange(block.id, e.target.value);
            };

            const handleKeyDown = (e) => {
                if (isComposing) return;

                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    onSplit(block.id, e.target.selectionStart);
                } else if (e.key === 'Backspace') {
                    if (e.target.selectionStart === 0 && e.target.selectionEnd === 0) {
                        e.preventDefault();
                        onMerge(block.id);
                    }
                }
            };

            const lineHeightPx = fontSize * 1.5;

            return (
                <div id={`block-${block.id}`} className="group relative flex items-start w-full py-1">
                    <div 
                        className="absolute -left-10 md:-left-12 top-1 flex items-center justify-center w-8 opacity-0 group-hover:opacity-100 transition-opacity duration-200"
                        style={{ height: `${lineHeightPx}px` }}
                    >
                        <button 
                            onClick={() => onToggleSticky(block.id)}
                            className={`p-1 rounded transition-colors ${block.sticky ? 'text-accent hover:text-sky-300 opacity-100' : 'text-gray-500 hover:text-gray-300'}`}
                            title="付箋を貼る/外す"
                            tabIndex="-1"
                        >
                            <IconSticky solid={block.sticky} />
                        </button>
                    </div>
                    {block.sticky && (
                        <div 
                            className="absolute -left-10 md:-left-12 top-1 flex items-center justify-center w-8 pointer-events-none group-hover:hidden text-accent opacity-80"
                            style={{ height: `${lineHeightPx}px` }}
                        >
                            <IconSticky solid={true} />
                        </div>
                    )}

                    <textarea
                        ref={textareaRef}
                        value={block.text}
                        onChange={handleChange}
                        onKeyDown={handleKeyDown}
                        onCompositionStart={() => setIsComposing(true)}
                        onCompositionEnd={() => setIsComposing(false)}
                        placeholder={index === 0 && block.text === '' ? "思いついたことを記述する..." : ""}
                        className="w-full bg-transparent text-gray-200 outline-none resize-none overflow-hidden placeholder-dark-600"
                        style={{ 
                            fontSize: `${fontSize}px`, 
                            lineHeight: 1.5 
                        }}
                        rows={1}
                    />
                </div>
            );
        };

        const App = () => {
            const [blocks, setBlocks] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [sidebarMode, setSidebarMode] = useState('sticky');
            const [searchQuery, setSearchQuery] = useState('');
            const [focusRequest, setFocusRequest] = useState(null);
            
            const [fontSize, setFontSize] = useState(18);

            // タップ操作などのネイティブイベントに対するViewport制御
            useEffect(() => {
                const preventZoom = (e) => {
                    const target = e.target;
                    if (target && (target.tagName === 'TEXTAREA' || target.tagName === 'INPUT')) {
                        lockViewport();
                    }
                };

                const restoreZoom = (e) => {
                    const target = e.target;
                    if (target && (target.tagName === 'TEXTAREA' || target.tagName === 'INPUT')) {
                        unlockViewport();
                    }
                };

                document.addEventListener('touchstart', preventZoom, { capture: true, passive: true });
                document.addEventListener('focusin', preventZoom, { capture: true });
                document.addEventListener('focusout', restoreZoom, { capture: true });

                return () => {
                    document.removeEventListener('touchstart', preventZoom, { capture: true });
                    document.removeEventListener('focusin', preventZoom, { capture: true });
                    document.removeEventListener('focusout', restoreZoom, { capture: true });
                };
            }, []);

            useEffect(() => {
                const savedBlocks = localStorage.getItem('unscroll_data');
                if (savedBlocks) {
                    try {
                        const parsed = JSON.parse(savedBlocks);
                        if (parsed && parsed.length > 0) {
                            setBlocks(parsed);
                        } else {
                            setBlocks([{ id: generateId(), text: '', sticky: false }]);
                        }
                    } catch (e) {
                        setBlocks([{ id: generateId(), text: '', sticky: false }]);
                    }
                } else {
                    setBlocks([{ id: generateId(), text: '', sticky: false }]);
                }

                const savedFontSize = localStorage.getItem('unscroll_fontsize');
                if (savedFontSize) {
                    setFontSize(Number(savedFontSize));
                }

                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('unscroll_data', JSON.stringify(blocks));
                    localStorage.setItem('unscroll_fontsize', fontSize.toString());
                }
            }, [blocks, fontSize, isLoaded]);

            const updateBlockText = useCallback((id, text) => {
                setBlocks(prev => prev.map(b => b.id === id ? { ...b, text } : b));
            }, []);

            const toggleSticky = useCallback((id) => {
                setBlocks(prev => prev.map(b => b.id === id ? { ...b, sticky: !b.sticky } : b));
            }, []);

            const splitBlock = useCallback((id, cursorPosition) => {
                setBlocks(prev => {
                    const idx = prev.findIndex(b => b.id === id);
                    if (idx === -1) return prev;

                    const targetBlock = prev[idx];
                    const textBefore = targetBlock.text.substring(0, cursorPosition);
                    const textAfter = targetBlock.text.substring(cursorPosition);
                    
                    const newBlock = { id: generateId(), text: textAfter, sticky: false };
                    
                    const newBlocks = [...prev];
                    newBlocks[idx] = { ...targetBlock, text: textBefore };
                    newBlocks.splice(idx + 1, 0, newBlock);

                    setFocusRequest({ id: newBlock.id, offset: 0 });
                    
                    return newBlocks;
                });
            }, []);

            const mergeBlock = useCallback((id) => {
                setBlocks(prev => {
                    const idx = prev.findIndex(b => b.id === id);
                    if (idx <= 0) return prev; 

                    const currentBlock = prev[idx];
                    const prevBlock = prev[idx - 1];
                    const prevTextLength = prevBlock.text.length;

                    const newBlocks = [...prev];
                    newBlocks[idx - 1] = { ...prevBlock, text: prevBlock.text + currentBlock.text };
                    newBlocks.splice(idx, 1);

                    setFocusRequest({ id: prevBlock.id, offset: prevTextLength });

                    return newBlocks;
                });
            }, []);

            const handleFocusHandled = useCallback(() => {
                setFocusRequest(null);
            }, []);

            const scrollToBlock = (id) => {
                const el = document.getElementById(`block-${id}`);
                if (el) {
                    const y = el.getBoundingClientRect().top + window.scrollY - 100;
                    window.scrollTo({ top: y, behavior: 'smooth' });
                    if (window.innerWidth < 768) {
                        setSidebarOpen(false);
                    }
                    // ジャンプによるフォーカス移動の準備としてロック
                    lockViewport();
                    setFocusRequest({ id, offset: 0 });
                }
            };

            const stickyBlocks = useMemo(() => blocks.filter(b => b.sticky), [blocks]);
            const searchResults = useMemo(() => {
                if (!searchQuery.trim()) return [];
                const query = searchQuery.toLowerCase();
                return blocks.filter(b => b.text.toLowerCase().includes(query));
            }, [blocks, searchQuery]);

            if (!isLoaded) return <div className="h-screen bg-dark-900 flex items-center justify-center text-dark-600">Loading...</div>;

            return (
                <div className="flex h-screen w-full bg-dark-900 overflow-hidden text-gray-200">
                    {sidebarOpen && (
                        <div className="fixed inset-0 bg-black/50 z-20 md:hidden" onClick={() => setSidebarOpen(false)}></div>
                    )}

                    <div className={`fixed md:relative z-30 h-full w-80 bg-dark-800 border-r border-dark-700 flex flex-col transition-transform duration-300 ease-in-out ${sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-4 border-b border-dark-700 flex justify-between items-center">
                            <h1 className="text-xl font-bold tracking-wider text-gray-100">Unscroll</h1>
                            <button onClick={() => setSidebarOpen(false)} className="md:hidden text-gray-400 hover:text-white">
                                <IconX />
                            </button>
                        </div>

                        <div className="flex border-b border-dark-700">
                            <button className={`flex-1 py-3 text-sm font-medium transition-colors ${sidebarMode === 'sticky' ? 'text-accent border-b-2 border-accent' : 'text-gray-400 hover:text-gray-200'}`} onClick={() => setSidebarMode('sticky')}>付箋一覧</button>
                            <button 
                                className={`flex-1 py-3 text-sm font-medium transition-colors ${sidebarMode === 'search' ? 'text-accent border-b-2 border-accent' : 'text-gray-400 hover:text-gray-200'}`} 
                                onClick={() => { 
                                    setSidebarMode('search'); 
                                    lockViewport();
                                    requestAnimationFrame(() => {
                                        setTimeout(() => document.getElementById('search-input')?.focus(), 100); 
                                    });
                                }}
                            >
                                検索
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            {sidebarMode === 'sticky' ? (
                                <div>
                                    {stickyBlocks.length === 0 ? (
                                        <p className="text-dark-600 text-sm text-center mt-8">付箋が貼られたメモはありません</p>
                                    ) : (
                                        <ul className="space-y-3">
                                            {stickyBlocks.map(b => (
                                                <li key={`sticky-${b.id}`}>
                                                    <button onClick={() => scrollToBlock(b.id)} className="w-full text-left p-3 rounded-lg bg-dark-700 hover:bg-dark-600 transition-colors group flex flex-col gap-1">
                                                        <div className="flex items-center gap-2 text-accent">
                                                            <IconSticky solid={true} />
                                                            <span className="text-xs text-gray-400 group-hover:text-gray-300">ジャンプ</span>
                                                        </div>
                                                        <p className="text-sm line-clamp-3 text-gray-200 break-words">{b.text || '(空の行)'}</p>
                                                    </button>
                                                </li>
                                            ))}
                                        </ul>
                                    )}
                                </div>
                            ) : (
                                <div className="flex flex-col h-full">
                                    <div className="relative mb-4 flex items-center">
                                        <div className="absolute left-3 text-gray-500 pointer-events-none">
                                            <IconSearch />
                                        </div>
                                        <input
                                            id="search-input"
                                            type="text"
                                            placeholder="メモを検索..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full pl-10 pr-4 py-1.5 bg-dark-900 border border-dark-600 rounded-lg text-[16px] text-gray-200 placeholder-dark-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all"
                                        />
                                    </div>
                                    <div className="flex-1">
                                        {!searchQuery.trim() ? (
                                            <p className="text-dark-600 text-sm text-center mt-4">キーワードを入力してください</p>
                                        ) : searchResults.length === 0 ? (
                                            <p className="text-dark-600 text-sm text-center mt-4">一致するメモがありません</p>
                                        ) : (
                                            <ul className="space-y-3">
                                                {searchResults.map(b => (
                                                    <li key={`search-${b.id}`}>
                                                        <button onClick={() => scrollToBlock(b.id)} className="w-full text-left p-3 rounded-lg bg-dark-700 hover:bg-dark-600 transition-colors">
                                                            <p className="text-sm line-clamp-3 text-gray-200 break-words">
                                                                {b.text.split(new RegExp(`(${searchQuery})`, 'gi')).map((part, i) => 
                                                                    part.toLowerCase() === searchQuery.toLowerCase() 
                                                                        ? <span key={i} className="bg-accent/30 text-accent font-medium">{part}</span> 
                                                                        : part
                                                                )}
                                                            </p>
                                                        </button>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="p-4 border-t border-dark-700 bg-dark-800">
                            <div className="flex justify-between items-center mb-3">
                                <span className="text-sm font-medium text-gray-400">文字サイズ</span>
                                <span className="text-sm text-gray-300 bg-dark-900 px-2 py-0.5 rounded">{fontSize}px</span>
                            </div>
                            <input 
                                type="range" 
                                min="12" 
                                max="48" 
                                value={fontSize} 
                                onChange={(e) => setFontSize(Number(e.target.value))}
                                className="w-full"
                            />
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col h-full relative">
                        <div className="md:hidden absolute top-0 left-0 right-0 p-4 flex items-center z-10 bg-gradient-to-b from-dark-900 to-transparent pointer-events-none">
                            <button onClick={() => setSidebarOpen(true)} className="p-2 -ml-2 rounded-lg bg-dark-800 text-gray-400 pointer-events-auto shadow-lg border border-dark-700">
                                <IconMenu />
                            </button>
                        </div>

                        <div 
                            className="flex-1 overflow-y-auto scroll-smooth pt-16 md:pt-24 pb-64 px-4 sm:px-8 md:px-16 lg:px-24"
                            onClick={(e) => {
                                if(e.target === e.currentTarget) {
                                    const lastBlock = blocks[blocks.length - 1];
                                    if(lastBlock) {
                                        lockViewport();
                                        requestAnimationFrame(() => {
                                            setFocusRequest({ id: lastBlock.id, offset: lastBlock.text.length });
                                        });
                                    }
                                }
                            }}
                        >
                            <div className="max-w-3xl mx-auto flex flex-col pl-8 md:pl-12">
                                {blocks.map((block, index) => (
                                    <Block 
                                        key={block.id}
                                        index={index}
                                        block={block}
                                        onChange={updateBlockText}
                                        onSplit={splitBlock}
                                        onMerge={mergeBlock}
                                        onToggleSticky={toggleSticky}
                                        focusRequest={focusRequest}
                                        onFocusHandled={handleFocusHandled}
                                        fontSize={fontSize}
                                    />
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
